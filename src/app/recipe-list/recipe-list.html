<section>
  <label for="searchTerm">Search Recipes</label>
  <input
    id="searchTerm"
    type="text"
    [ngModel]="recipeService.searchTerm()"
    (ngModelChange)="recipeService.searchTerm.set($event)"
    placeholder="recipe name"
  />
  <nav>
    <ul>
      @for (recipe of recipeService.filteredBySearchRecipes(); track $index) {
        <li>
          <a [routerLink]="['/recipes', recipe.id]">{{ recipe.name }}</a>
        </li>
      }
    </ul>
  </nav>
</section>
