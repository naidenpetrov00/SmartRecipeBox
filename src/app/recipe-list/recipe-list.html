<section>
  <div class="recipe-container">
    <button (click)="toogleFavouriteStatus()">
      @if (recipe().isFavorite) {
        ★
      } @else {
        ☆
      }
    </button>
    <app-recipe-detail [recipe]="recipe()"></app-recipe-detail>
    <button type="button" (click)="nextRecipe()">Next recipe</button>
  </div>
</section>
