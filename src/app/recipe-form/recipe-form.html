<form (submit)="onSubmit($event)" class="recipe-form">
  <input id="title" type="text" placeholder="Title" [formField]="recipeForm.recipeTitle" />
  <input id="email" type="email" placeholder="Email" [formField]="recipeForm.authorEmail" />
  <textarea
    id="description"
    placeholder="Description..."
    [formField]="recipeForm.recipeDetails"
  ></textarea>
  <input
    id="image-url"
    type="url"
    placeholder="Paste image URL..."
    [formField]="recipeForm.recipeImage"
  />
  <button matButton="elevated" type="submit">Add Recipe</button>
</form>
